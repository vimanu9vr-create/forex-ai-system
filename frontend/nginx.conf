server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST API → backend (the trailing slash strips the /api prefix:
    #   /api/signals  ->  app:8000/signals)
    location /api/ {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket live signals → backend
    location /ws/ {
        proxy_pass http://app:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA: serve the file if it exists, else fall back to index.html (client routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
